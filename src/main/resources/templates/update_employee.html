<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Employee - EMS</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<nav class="navbar navbar-light bg-white border-bottom">
		<div class="container">
			<a class="navbar-brand" th:href="@{/}">EMS</a>
			<a class="btn btn-outline-secondary btn-sm" th:href="@{/}">Back</a>
		</div>
	</nav>

	<div class="container my-4">
		<div class="card">
			<div class="card-body p-4">
				<h2 class="page-title mb-1">Edit employee</h2>
				<div class="muted small mb-4">Update the employee profile.</div>

				<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

		<form action="#" th:action="@{/saveEmployee}" th:object="${employee}"
			method="POST" enctype="multipart/form-data">
			
			<!-- Add hidden form field to handle update -->
			<input type="hidden" th:field="*{id}" />
			
			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">First name</label>
					<input type="text" th:field="*{firstName}" class="form-control" required>
				</div>
				<div class="col-md-6">
					<label class="form-label">Last name</label>
					<input type="text" th:field="*{lastName}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Email</label>
					<input type="email" th:field="*{email}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Phone</label>
					<input type="text" th:field="*{phone}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Department</label>
					<input type="text" th:field="*{department}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Joining date</label>
					<input type="date" th:field="*{joiningDate}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Salary</label>
					<input type="number" step="0.01" th:field="*{salary}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Profile image URL</label>
					<input type="text" th:field="*{profileImage}" class="form-control">
				</div>
				<div class="col-md-6">
					<label class="form-label">Upload new profile image</label>
					<input type="file" name="imageFile" accept="image/*" class="form-control">
					<div class="form-text">Leave empty to keep current image.</div>
				</div>
				<div class="col-12">
					<label class="form-label">Address</label>
					<textarea th:field="*{address}" class="form-control" rows="3"></textarea>
				</div>
				<div class="col-12 d-flex gap-2 mt-2">
					<button type="submit" class="btn btn-primary">Save changes</button>
					<a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
				</div>
			</div>
		</form>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
