<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attendance - EMS</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<div class="container my-4">
		<div class="d-flex justify-content-between align-items-end mb-3">
			<div>
				<h2 class="page-title mb-1">Attendance</h2>
				<div class="muted small" th:text="${employee.firstName + ' ' + employee.lastName}"></div>
			</div>
			<a th:href="@{'/employees/' + ${employee.id}}" class="btn btn-outline-secondary btn-sm">Back to profile</a>
		</div>

		<div class="card mb-3">
			<div class="card-body">
				<form th:action="@{'/employees/' + ${employee.id} + '/attendance'}" method="post" class="row g-2 align-items-end">
					<div class="col-12 col-md-4">
						<label class="form-label muted small">Mark today</label>
						<select name="status" class="form-select">
							<option value="PRESENT">Present</option>
							<option value="ABSENT">Absent</option>
							<option value="LEAVE">Leave</option>
						</select>
					</div>
					<div class="col-12 col-md-3">
						<button type="submit" class="btn btn-primary w-100">Save</button>
					</div>
				</form>
			</div>
		</div>

		<div class="card">
			<div class="table-responsive">
				<table class="table align-middle mb-0">
					<thead>
						<tr>
							<th>Date</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="record : ${attendanceRecords}">
							<td th:text="${record.date}"></td>
							<td>
								<span class="badge text-bg-light" th:text="${record.status}"></span>
							</td>
						</tr>
						<tr th:if="${attendanceRecords == null or #lists.isEmpty(attendanceRecords)}">
							<td colspan="2" class="text-center text-muted py-4">No attendance records yet.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
