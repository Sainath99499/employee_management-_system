<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - EMS</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<div class="container" style="max-width: 440px; margin-top: 90px;">
		<div class="card">
			<div class="card-body p-4">
				<div class="mb-3">
					<div class="fw-bold" style="font-size: 20px;">Welcome back</div>
					<div class="muted small">Sign in to manage employees</div>
				</div>

				<div th:if="${param.error}" class="alert alert-danger">
					Invalid username or password.
				</div>
				<div th:if="${param.logout}" class="alert alert-success">
					You have been logged out.
				</div>
				<div th:if="${param.registered}" class="alert alert-success">
					Account created. Please sign in.
				</div>

				<form th:action="@{/login}" method="post" class="mt-3">
					<div class="mb-3">
						<label for="username" class="form-label">Username</label>
						<input id="username" name="username" class="form-control" autofocus required />
					</div>
					<div class="mb-3">
						<label for="password" class="form-label">Password</label>
						<input id="password" name="password" type="password" class="form-control" required />
					</div>
					<button type="submit" class="btn btn-primary w-100">Login</button>
				</form>

				<hr>
				<div class="d-flex justify-content-between align-items-center">
					<small class="muted">
						Default admin: <b>admin</b> / <b>admin123</b>
					</small>
					<a th:href="@{/register}" class="text-decoration-none small">Create account</a>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
