<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard - EMS</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
	<div class="container my-4">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<div>
				<h2 class="page-title mb-0">Dashboard</h2>
				<div class="muted small">Company overview</div>
			</div>
			<a th:href="@{/}" class="btn btn-outline-secondary btn-sm">Back to employees</a>
		</div>

		<div class="row mb-4">
			<div class="col-md-4 mb-3">
				<div class="card">
					<div class="card-body">
						<div class="muted small">Total employees</div>
						<div class="display-6 fw-bold" th:text="${totalEmployees}">0</div>
					</div>
				</div>
			</div>
			<div class="col-md-4 mb-3">
				<div class="card">
					<div class="card-body">
						<div class="muted small">Average salary</div>
						<div class="display-6 fw-bold">
							<span th:text="${#numbers.formatDecimal(averageSalary, 1, 'COMMA', 2, 'POINT')}"></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="row">
			<div class="col-lg-8">
				<div class="card">
					<div class="card-body">
						<div class="fw-semibold mb-2">Employees per department</div>
						<canvas id="deptChart"></canvas>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
		/*<![CDATA[*/
		const deptData = /*[[${employeesPerDept}]]*/ {};
		const labels = Object.keys(deptData);
		const counts = Object.values(deptData);

		const ctx = document.getElementById('deptChart').getContext('2d');
		new Chart(ctx, {
			type: 'bar',
			data: {
				labels: labels,
				datasets: [{
					label: 'Employees per Department',
					data: counts,
					backgroundColor: 'rgba(54, 162, 235, 0.5)',
					borderColor: 'rgba(54, 162, 235, 1)',
					borderWidth: 1
				}]
			},
			options: {
				scales: {
					y: {
						beginAtZero: true,
						precision: 0
					}
				}
			}
		});
		/*]]>*/
	</script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
