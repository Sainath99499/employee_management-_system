<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employees - EMS</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
	
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
		<div class="container">
			<a class="navbar-brand" th:href="@{/}">EMS</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="nav">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item" sec:authorize="hasRole('ADMIN')">
						<a class="nav-link active" th:href="@{/}">Employees</a>
					</li>
					<li class="nav-item" sec:authorize="hasRole('ADMIN')">
						<a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
					</li>
					<li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
						<a class="nav-link" th:href="@{/employees/me}">My profile</a>
					</li>
				</ul>
				<div class="d-flex align-items-center gap-3">
					<span class="small muted" sec:authorize="isAuthenticated()">
						Signed in as <b sec:authentication="name"></b>
					</span>
					<a class="btn btn-outline-secondary btn-sm" th:href="@{/logout}">Logout</a>
				</div>
			</div>
		</div>
	</nav>

	<div class="container my-4">
		<div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
			<div>
				<h2 class="page-title mb-1">Employees</h2>
				<div class="muted small" th:if="${totalItems != null}">
					<span th:text="${totalItems}"></span> total
				</div>
			</div>
			<div class="d-flex gap-2">
				<a sec:authorize="hasRole('ADMIN')" th:href="@{/showNewEmployeeForm}" class="btn btn-primary btn-sm">Add employee</a>
				<a th:href="@{/dashboard}" class="btn btn-outline-primary btn-sm">View dashboard</a>
			</div>
		</div>
	
		<div class="card mb-3">
			<div class="card-body">
				<form th:action="@{/search}" method="get" class="row g-2 align-items-end">
					<div class="col-12 col-md-3">
						<label class="form-label small muted">Name</label>
						<input type="text" name="keyword" th:value="${keyword}" placeholder="Search by name..." class="form-control">
					</div>
					<div class="col-12 col-md-3">
						<label class="form-label small muted">Department</label>
						<input type="text" name="department" th:value="${department}" placeholder="e.g. HR, IT" class="form-control">
					</div>
					<div class="col-6 col-md-2">
						<label class="form-label small muted">Min salary</label>
						<input type="number" step="0.01" name="minSalary" th:value="${minSalary}" class="form-control">
					</div>
					<div class="col-6 col-md-2">
						<label class="form-label small muted">Max salary</label>
						<input type="number" step="0.01" name="maxSalary" th:value="${maxSalary}" class="form-control">
					</div>
					<div class="col-12 col-md-2 d-flex gap-2">
						<button type="submit" class="btn btn-outline-primary w-100">Search</button>
						<a th:href="@{/}" class="btn btn-outline-secondary w-100">Clear</a>
					</div>
				</form>
			</div>
		</div>
	
		<div class="card">
			<div class="table-responsive">
				<table class="table align-middle mb-0">
					<thead>
						<tr>
							<th style="width: 90px;">ID</th>
							<th>Name</th>
							<th>Email</th>
							<th>Department</th>
							<th>Joining</th>
							<th style="width: 220px;" class="text-end">Actions</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="employee : ${listEmployees}">
							<td class="text-muted" th:text="${employee.id}"></td>
							<td>
								<div class="fw-semibold">
									<a class="text-decoration-none" th:href="@{/employees/{id}(id=${employee.id})}"
										th:text="${employee.firstName + ' ' + employee.lastName}"></a>
								</div>
								<div class="small muted" th:text="${employee.phone}"></div>
							</td>
							<td th:text="${employee.email}"></td>
							<td>
								<span class="badge badge-soft" th:text="${employee.department != null ? employee.department : 'Unassigned'}"></span>
							</td>
							<td th:text="${employee.joiningDate}"></td>
							<td class="text-end">
								<a class="btn btn-outline-secondary btn-sm"
									th:href="@{/employees/{id}(id=${employee.id})}">View</a>
								<a sec:authorize="hasRole('ADMIN')" th:href="@{/showFormForUpdate/{id}(id=${employee.id})}" class="btn btn-outline-primary btn-sm">Edit</a>
								<a sec:authorize="hasRole('ADMIN')" th:href="@{/deleteEmployee/{id}(id=${employee.id})}" class="btn btn-outline-danger btn-sm"
									onclick="return confirm('Delete this employee?')">Delete</a>
							</td>
						</tr>
						<tr th:if="${listEmployees == null or #lists.isEmpty(listEmployees)}">
							<td colspan="6" class="text-center text-muted py-4">No employees found.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<nav th:if="${totalPages != null and totalPages > 1}">
			<ul class="pagination justify-content-center mt-3">
				<li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
					<a class="page-link" th:href="@{'/page/' + ${currentPage - 1}}">Previous</a>
				</li>
				<li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
					th:classappend="${i == currentPage} ? 'active'">
					<a class="page-link" th:href="@{'/page/' + ${i}}" th:text="${i}"></a>
				</li>
				<li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
					<a class="page-link" th:href="@{'/page/' + ${currentPage + 1}}">Next</a>
				</li>
			</ul>
		</nav>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
