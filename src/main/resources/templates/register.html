<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register - EMS</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<div class="container" style="max-width: 520px; margin-top: 70px;">
		<div class="card">
			<div class="card-body p-4">
				<div class="mb-3">
					<div class="fw-bold" style="font-size: 20px;">Create your account</div>
					<div class="muted small">Register as an employee user.</div>
				</div>

				<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

				<form th:action="@{/register}" method="post" th:object="${registerRequest}">
					<div class="mb-3">
						<label class="form-label">Username</label>
						<input class="form-control" th:field="*{username}" required />
						<div class="form-text">Username will be stored in lowercase.</div>
					</div>
					<div class="mb-3">
						<label class="form-label">Password</label>
						<input class="form-control" type="password" th:field="*{password}" required />
					</div>
					<div class="mb-3">
						<label class="form-label">Confirm password</label>
						<input class="form-control" type="password" th:field="*{confirmPassword}" required />
					</div>

					<button type="submit" class="btn btn-primary w-100">Create account</button>
				</form>

				<hr>
				<div class="d-flex justify-content-between">
					<a th:href="@{/login}" class="text-decoration-none">Back to login</a>
					<small class="muted">Role: <b>EMPLOYEE</b></small>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
